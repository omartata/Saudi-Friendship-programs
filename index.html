<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>برامج جمعية أصدقاء السعودية</title>
<style>
  :root{
    --green:#1b6b5a; --green-d:#123c33; --green-l:#eaf3f0;
    --line:#e2ded3; --line-g:#cfe4dd; --ink:#2b2b2b; --muted:#6b6b6b;
    --bg:#f7f6f2; --card:#ffffff;
    --sub-border:#f0eee7; --chip-bg:#eaf3f0; --shadow:rgba(18,60,51,.08);
  }
  html[data-theme="dark"]{
    --green:#4fd1b5; --green-d:#e8f5f1; --green-l:#16302a;
    --line:#2a3a35; --line-g:#2f4a43; --ink:#e6e9e8; --muted:#9fb0ab;
    --bg:#0f1715; --card:#16211e;
    --sub-border:#22302c; --chip-bg:#1a2d28; --shadow:rgba(0,0,0,.4);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:"Segoe UI","Tahoma",sans-serif; line-height:1.7;
    -webkit-font-smoothing:antialiased; transition:background .3s,color .3s;
  }
  .wrap{max-width:860px; margin:0 auto; padding:32px 18px 64px;}

  header.page{
    padding:8px 0 22px; border-bottom:3px solid var(--green); margin-bottom:8px;
    display:flex; align-items:center; gap:18px;
  }
  header.page .logo{flex:0 0 auto; width:76px; height:auto;}
  header.page .htext{flex:1;}
  header.page h1{margin:0 0 4px; font-size:1.9rem; color:var(--green-d); font-weight:800; letter-spacing:-.5px;}
  header.page p{margin:0; color:var(--muted); font-size:.95rem;}

  .toolbar{display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin:18px 0 22px;}
  .toolbar button{
    font-family:inherit; font-size:.85rem; cursor:pointer;
    background:var(--card); color:var(--green); border:1px solid var(--line-g);
    border-radius:20px; padding:7px 16px; transition:.15s; display:inline-flex;
    align-items:center; gap:6px;
  }
  .toolbar button:hover{background:var(--green-l);}
  .search{flex:1; min-width:170px; position:relative;}
  .search input{
    width:100%; font-family:inherit; font-size:.9rem; color:var(--ink);
    border:1px solid var(--line-g); border-radius:10px; padding:9px 38px 9px 14px;
    background:var(--card); outline:none;
  }
  html[dir="ltr"] .search input{padding:9px 14px 9px 38px;}
  .search input:focus{border-color:var(--green);}
  .search svg{position:absolute; inset-inline-start:12px; top:50%; transform:translateY(-50%); opacity:.4;}

  .initiative{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    margin-bottom:14px; overflow:hidden; transition:box-shadow .2s,background .3s;
  }
  .initiative.open{box-shadow:0 6px 24px var(--shadow);}
  .head{
    display:flex; align-items:center; gap:14px; width:100%;
    padding:18px 20px; cursor:pointer; background:none; border:none;
    font-family:inherit; text-align:inherit; color:inherit;
  }
  .head .num{
    flex:0 0 auto; width:34px; height:34px; line-height:34px; text-align:center;
    background:var(--green); color:var(--card); border-radius:9px; font-weight:800; font-size:1rem;
  }
  .head .t{flex:1;}
  .head .t .name{display:block; font-size:1.15rem; font-weight:800; color:var(--green-d);}
  .head .t .en{display:block; font-size:.82rem; color:var(--green); font-weight:600; direction:ltr; unicode-bidi:isolate; text-align:start;}
  .head .t .meta{display:block; font-size:.8rem; color:var(--muted); margin-top:1px;}
  .head .chev{flex:0 0 auto; transition:transform .25s; opacity:.5;}
  .initiative.open .head .chev{transform:rotate(180deg);}

  .body{max-height:0; overflow:hidden; transition:max-height .35s ease;}
  .body .inner{padding:0 20px 20px;}
  .desc{color:var(--ink); opacity:.85; font-size:.98rem; margin:0 0 4px;}

  .pillars{margin-top:12px; display:flex; flex-wrap:wrap; gap:6px;}
  .tag{font-size:.78rem; color:var(--green); background:var(--chip-bg); border:1px solid var(--line-g); border-radius:20px; padding:3px 12px;}

  .block-head{font-size:.85rem; color:var(--green); font-weight:800; margin:16px 0 8px; padding-top:12px; border-top:1px dashed var(--line-g);}
  .comps{display:flex; flex-wrap:wrap; gap:6px;}
  .comp{font-size:.85rem; color:var(--green-d); background:var(--chip-bg); border:1px solid var(--line-g); border-radius:8px; padding:5px 12px;}

  ol.obj{margin:0; padding-inline-start:20px;}
  ol.obj li{font-size:.92rem; color:var(--ink); opacity:.85; margin-bottom:5px;}

  .sub{display:flex; gap:10px; padding:11px 0; border-bottom:1px solid var(--sub-border);}
  .sub:last-child{border-bottom:none;}
  .sub .sn{flex:0 0 auto; width:24px; height:24px; line-height:24px; text-align:center; background:var(--chip-bg); color:var(--green); border:1px solid var(--line-g); border-radius:7px; font-size:.82rem; font-weight:800;}
  .sub .sc{flex:1;}
  .sub .st{display:block; font-size:.98rem; font-weight:800; color:var(--green-d);}
  .sub .sen{display:block; font-size:.75rem; color:var(--green); font-weight:600; direction:ltr; unicode-bidi:isolate; text-align:start; margin-top:1px;}
  .sub .sd{font-size:.9rem; color:var(--ink); opacity:.75; margin-top:3px;}
  .sub .schips{margin-top:6px; display:flex; flex-wrap:wrap; gap:5px;}
  .nested{margin-top:10px; padding-inline-start:14px; border-inline-start:2px solid var(--line-g);}
  .nested .nsub{padding:8px 0;}
  .nested .nsn{background:var(--green); color:var(--card); border-color:var(--green);}
  .nested .st{font-size:.92rem;}
  .subproj{border:1px solid var(--line-g); border-radius:10px; margin:8px 0; overflow:hidden; background:var(--chip-bg);}
  .subproj.open{background:var(--card);}
  .subhead{display:flex; align-items:center; gap:10px; width:100%; padding:11px 12px; cursor:pointer; background:none; border:none; font-family:inherit; text-align:inherit; color:inherit;}
  .subhead .submeta{display:block; font-size:.72rem; color:var(--muted); margin-top:1px;}
  .subhead .schev{flex:0 0 auto; transition:transform .25s; opacity:.5;}
  .subproj.open .subhead .schev{transform:rotate(180deg);}
  .subbody{max-height:0; overflow:hidden; transition:max-height .3s ease;}
  .subinner{padding:0 12px 12px;}
  .subinner .sd{margin:0 0 6px;}
  .schip{font-size:.75rem; color:var(--green); background:var(--chip-bg); border:1px solid var(--line-g); border-radius:6px; padding:2px 9px;}

  table.mini,table.dist{border-collapse:collapse; margin-top:8px;}
  table.mini{font-size:.82rem;}
  table.mini th{background:var(--green); color:var(--card); padding:5px 18px; border:1px solid var(--line-g); font-weight:700;}
  table.mini td{padding:5px 18px; border:1px solid var(--line-g); text-align:center; color:var(--ink);}
  table.dist{width:100%; font-size:.92rem;}
  table.dist th{background:var(--green); color:var(--card); padding:8px 14px; border:1px solid var(--line-g);}
  table.dist td{padding:8px 14px; border:1px solid var(--line-g); color:var(--ink);}
  table.dist td.cat{font-weight:800; color:var(--green-d);}
  table.dist td.cnt{text-align:center;}
  table.dist tr.total td{background:var(--chip-bg); font-weight:800; color:var(--green);}

  .no-results{display:none; text-align:center; color:var(--muted); padding:40px 0;}
  footer{margin-top:30px; text-align:center; font-size:.8rem; color:var(--muted);}

  @media (max-width:520px){
    header.page h1{font-size:1.4rem;}
    header.page{gap:12px;}
    header.page .logo{width:56px;}
    .head{padding:15px 14px; gap:10px;}
    .body .inner{padding:0 14px 16px;}
  }
</style>
</head>

let lang = "ar";
let theme = "light";

function esc(s){return s;}

function renderChips(cls, arr){
  return `<div class="${cls}">` + arr.map(c=>`<span class="${cls==='pillars'?'tag':cls==='comps'?'comp':'schip'}">${c}</span>`).join('') + `</div>`;
}

function buildCard(d){
  const t = UI[lang];
  const name = lang==='ar'?d.ar:d.en;
  const enline = lang==='ar'?`<span class="en">${d.en}</span>`:'';
  const meta = lang==='ar'?d.metaAr:d.metaEn;
  const desc = lang==='ar'?d.descAr:d.descEn;
  let inner = `<p class="desc">${desc}</p>`;

  if(d.pillarsAr){
    const p = lang==='ar'?d.pillarsAr:d.pillarsEn;
    inner += `<div class="pillars">${p.map(x=>`<span class="tag">${x}</span>`).join('')}</div>`;
  }
  if(d.objAr){
    const o = lang==='ar'?d.objAr:d.objEn;
    inner += `<div class="block-head">${t.objHead}</div><ol class="obj">${o.map(x=>`<li>${x}</li>`).join('')}</ol>`;
  }
  if(d.compsAr){
    const c = lang==='ar'?d.compsAr:d.compsEn;
    inner += `<div class="block-head">${t.compHead2}</div><div class="comps">${c.map(x=>`<span class="comp">${x}</span>`).join('')}</div>`;
  }
  if(d.offerAr){
    const o = lang==='ar'?d.offerAr:d.offerEn;
    inner += `<div class="block-head">${t.offerHead}</div><div class="comps">${o.map(x=>`<span class="comp">${x}</span>`).join('')}</div>`;
  }
  if(d.subs){
    inner += `<div class="block-head">${t.subHead}</div>`;
    d.subs.forEach((s,i)=>{
      const sname = lang==='ar'?s.ar:s.en;
      const senline = lang==='ar'?`<span class="sen">${s.en}</span>`:'';
      const sd = lang==='ar'?s.dAr:s.dEn;
      const num = lang==='ar'?['١','٢','٣','٤','٥','٦','٧','٨'][i]:(i+1);
      let chips='';
      if(s.chipsAr){const cc=lang==='ar'?s.chipsAr:s.chipsEn; chips=`<span class="schips">${cc.map(x=>`<span class="schip">${x}</span>`).join('')}</span>`;}
      let hours='';
      if(s.hours){hours=`<table class="mini"><tr><th>NV</th><th>JV</th><th>SV</th><th>CV</th></tr><tr><td>40h</td><td>80h</td><td>160h</td><td>300h</td></tr></table>`;}

      if(s.subprogs){
        // collapsible sub-project (like an initiative)
        const cnt = s.subprogs.length;
        const cntLbl = lang==='ar'?(cnt+' برامج'):(cnt+' programs');
        let kids='';
        s.subprogs.forEach((sp,j)=>{
          const spn = lang==='ar'?sp.ar:sp.en;
          const spen = lang==='ar'?`<span class="sen">${sp.en}</span>`:'';
          const spd = lang==='ar'?sp.dAr:sp.dEn;
          let spchips='';
          if(sp.chipsAr){const cc=lang==='ar'?sp.chipsAr:sp.chipsEn; spchips=`<span class="schips">${cc.map(x=>`<span class="schip">${x}</span>`).join('')}</span>`;}
          const spnum = lang==='ar'?['أ','ب','ج','د','هـ','و'][j]:String.fromCharCode(97+j);
          kids += `<div class="sub nsub"><span class="sn nsn">${spnum}</span><span class="sc"><span class="st">${spn}</span>${spen}<span class="sd">${spd}</span>${spchips}</span></div>`;
        });
        inner += `<div class="subproj">
          <button class="subhead" onclick="toggleSub(this)">
            <span class="sn">${num}</span>
            <span class="sc"><span class="st">${sname}</span>${senline}<span class="submeta">${cntLbl}</span></span>
            <svg class="schev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
          </button>
          <div class="subbody"><div class="subinner"><p class="sd">${sd}</p>${chips}${hours}<div class="nested">${kids}</div></div></div>
        </div>`;
      } else {
        inner += `<div class="sub"><span class="sn">${num}</span><span class="sc"><span class="st">${sname}</span>${senline}<span class="sd">${sd}</span>${chips}${hours}</span></div>`;
      }
    });
  }
  if(d.dist){
    inner += `<div class="block-head">${t.distHead}</div><table class="dist"><tr><th>${t.distCat}</th><th>${t.distCnt}</th></tr>`;
    d.dist.forEach(r=>{ inner += `<tr><td class="cat">${lang==='ar'?r[0]:r[1]}</td><td class="cnt">${lang==='ar'?r[2]:convNum(r[2])}</td></tr>`; });
    inner += `<tr class="total"><td>${t.distTotal}</td><td class="cnt">${lang==='ar'?d.distTotal:convNum(d.distTotal)}</td></tr></table>`;
  }

  const num = lang==='ar'?d.n:d.ne;
  return `<div class="initiative">
    <button class="head" onclick="toggle(this)">
      <span class="num">${num}</span>
      <span class="t"><span class="name">${name}</span>${enline}<span class="meta">${meta}</span></span>
      <svg class="chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
    </button>
    <div class="body"><div class="inner">${inner}</div></div>
  </div>`;
}

function convNum(ar){
  const map={'٠':'0','١':'1','٢':'2','٣':'3','٤':'4','٥':'5','٦':'6','٧':'7','٨':'8','٩':'9'};
  return ar.replace(/[٠-٩]/g,d=>map[d]);
}

function render(){
  const t = UI[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = lang==='ar'?'rtl':'ltr';
  document.title = t.title;
  document.getElementById('pageTitle').textContent = t.title;
  document.getElementById('pageSub').textContent = t.sub;
  document.getElementById('q').placeholder = t.search;
  document.getElementById('btnOpen').textContent = t.openAll;
  document.getElementById('btnClose').textContent = t.closeAll;
  document.getElementById('btnLang').textContent = t.lang;
  document.getElementById('btnTheme').textContent = theme==='dark'?t.themeLight:t.theme;
  document.getElementById('noRes').textContent = t.noRes;
  document.getElementById('footer').textContent = t.footer;
  document.querySelector('.logo').alt = t.title;
  document.getElementById('list').innerHTML = DATA.map(buildCard).join('');
  // open first
  const first = document.querySelector('.initiative');
  if(first){const b=first.querySelector('.body'); first.classList.add('open'); b.style.maxHeight=b.scrollHeight+'px';}
  document.getElementById('q').value='';
  document.getElementById('noRes').style.display='none';
}

function toggle(btn){
  const card = btn.closest('.initiative');
  const body = card.querySelector('.body');
  const open = card.classList.toggle('open');
  body.style.maxHeight = open ? body.scrollHeight + 'px' : null;
}
function toggleSub(btn){
  const proj = btn.closest('.subproj');
  const body = proj.querySelector('.subbody');
  const open = proj.classList.toggle('open');
  body.style.maxHeight = open ? body.scrollHeight + 'px' : null;
  // recompute the parent initiative body height so it never clips
  const initBody = proj.closest('.body');
  if(initBody){
    initBody.style.maxHeight = 'none';
  }
}
function setAll(open){
  document.querySelectorAll('.initiative').forEach(card=>{
    const body = card.querySelector('.body');
    if(open){card.classList.add('open'); body.style.maxHeight=body.scrollHeight+'px';}
    else{card.classList.remove('open'); body.style.maxHeight=null;}
  });
}
function doSearch(term){
  term = term.trim().toLowerCase();
  let any=false;
  document.querySelectorAll('.initiative').forEach(card=>{
    const txt = card.textContent.toLowerCase();
    const match = term==='' || txt.includes(term);
    card.style.display = match?'':'none';
    if(match) any=true;
    const body=card.querySelector('.body');
    if(term!=='' && match){card.classList.add('open'); body.style.maxHeight=body.scrollHeight+'px';}
    else if(term===''){card.classList.remove('open'); body.style.maxHeight=null;}
  });
  document.getElementById('noRes').style.display = any?'none':'block';
}
function toggleLang(){ lang = lang==='ar'?'en':'ar'; render(); }
function toggleTheme(){
  theme = theme==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('btnTheme').textContent = theme==='dark'?UI[lang].themeLight:UI[lang].theme;
}

render();
</script>
</body>
</html>
